upstream backend {
    server backend:8080;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Backend API ──
    location /api/ {
        proxy_pass         http://backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
    }

    # ── WebSocket (game server, handled by Express.js backend) ──
    location /ws {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }

    # ── Frontend (React SPA — static files) ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache: hashed assets (js/css with content hash) ──
    location ~* \.(js|css|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── No cache: 3D models and images (content may change) ──
    location ~* \.(glb|gltf|png|jpg|jpeg|gif|ico|svg)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Gzip ──
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    # ── Security headers ──
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff"    always;
}
