services:
  # ── Nginx Reverse Proxy (Entry Point) ──
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: pokemon-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
      - ws-server
    networks:
      - pokemon-net

  # ── React Frontend (SPA) ──
  frontend:
    build:
      context: ./pokemon-prop-hunt
      dockerfile: Dockerfile
    container_name: pokemon-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
      - ws-server
    networks:
      - pokemon-net

  # ── Spring Boot Backend API ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pokemon-backend
    restart: unless-stopped
    expose:
      - "8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/pokemon_prophunt?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      SPRING_DATASOURCE_USERNAME: pokemon
      SPRING_DATASOURCE_PASSWORD: pokemon1234
      SPRING_DATA_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: pokemon
      SPRING_RABBITMQ_PASSWORD: pokemon1234
    networks:
      - pokemon-net

  # ── Node.js WebSocket Game Server ──
  ws-server:
    build:
      context: ./pokemon-prop-hunt/server
      dockerfile: Dockerfile
    container_name: pokemon-ws-server
    restart: unless-stopped
    expose:
      - "3001"
    networks:
      - pokemon-net

  # ── MySQL Database ──
  mysql:
    image: mysql:8.0
    container_name: pokemon-mysql
    restart: unless-stopped
    expose:
      - "3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass1234
      MYSQL_DATABASE: pokemon_prophunt
      MYSQL_USER: pokemon
      MYSQL_PASSWORD: pokemon1234
      TZ: Asia/Seoul
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - pokemon-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "pokemon", "-ppokemon1234"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Cache ──
  redis:
    image: redis:7-alpine
    container_name: pokemon-redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    networks:
      - pokemon-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── RabbitMQ Message Broker ──
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: pokemon-rabbitmq
    restart: unless-stopped
    expose:
      - "5672"
    ports:
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: pokemon
      RABBITMQ_DEFAULT_PASS: pokemon1234
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - pokemon-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  rabbitmq-data:
    driver: local

networks:
  pokemon-net:
    driver: bridge
