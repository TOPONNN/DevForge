server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # WebSocket proxy to game server
    location /ws {
        proxy_pass http://pokemon-ws-server:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed assets (js/css with content hash in filename)
    location ~* \.(js|css|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # No cache for 3D models and images (content may change)
    location ~* \.(glb|gltf|png|jpg|jpeg|gif|ico|svg)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;
}
